server {
    listen 80;
    server_name evcharger.unearth-ai.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name evcharger.unearth-ai.com;

    # SSL certificates (Let's Encrypt / certbot)
    ssl_certificate /etc/letsencrypt/live/evcharger.unearth-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evcharger.unearth-ai.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Gzip compression (important for 126MB GeoJSON)
    gzip on;
    gzip_types application/json application/geo+json application/javascript text/css text/html;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Proxy to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for large responses
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
